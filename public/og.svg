    <rect x="20"  y="8"  width="9" height="64" rx="4" fill="url(#accent)" opacity="0.7"/>
    <rect x="40"  y="-14" width="9" height="108" rx="4" fill="url(#accent)"/>
    <rect x="60"  y="14" width="9" height="52" rx="4" fill="url(#accent)" opacity="0.7"/>
    <rect x="80"  y="30" width="9" height="20" rx="4" fill="url(#accent)" opacity="0.5"/>
  </g>

  <text x="95" y="200" font-family="Inter, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#95a0bd" letter-spacing="1">suflo.ru</text>

  <text x="92" y="400" font-family="Inter, Helvetica, Arial, sans-serif" font-size="128" font-weight="800" fill="#e6e9f2" letter-spacing="-2">Suflo</text>

